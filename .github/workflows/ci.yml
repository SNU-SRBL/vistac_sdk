name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  # Set to "1" if parity skip is explicitly approved.
  ALLOW_PARITY_SKIP: "0"
  # Set to "1" to make missing GPU hard-fail this workflow.
  REQUIRE_GPU_TESTS: "0"

jobs:
  cpu-safe-tests:
    name: cpu-safe-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run CPU-safe suite
        run: |
          set -euo pipefail
          pytest -q \
            tests/test_depth_estimator.py \
            tests/test_temporal_buffer.py \
            tests/test_viz_utils.py \
            tests/test_force_estimator.py \
            tests/test_tactile_processor.py

  parity-guard:
    name: parity-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Ensure parity test symbol exists
        run: |
          set -euo pipefail
          grep -q "def test_parity_against_sparsh_reference" tests/test_force_estimator.py

      - name: Enforce parity test is not silently skipped
        run: |
          set -euo pipefail
          pytest -q tests/test_force_estimator.py::TestForceEstimator::test_parity_against_sparsh_reference -rs > parity.out 2>&1 || true
          cat parity.out

          if grep -Eqi "(SKIPPED|1 skipped)" parity.out; then
            echo "Parity test was skipped."
            if [[ "${ALLOW_PARITY_SKIP}" != "1" ]]; then
              echo "Set ALLOW_PARITY_SKIP=1 only with explicit approval."
              exit 1
            fi
          fi

          if grep -Eqi "(1 passed|1 failed|ERROR)" parity.out; then
            if grep -Eqi "(1 failed|ERROR)" parity.out; then
              exit 1
            fi
            exit 0
          fi

          echo "Unexpected parity test outcome format."
          exit 1

  gpu-required-tests:
    name: gpu-required-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Detect GPU availability
        run: |
          set -euo pipefail
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "GPU_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "GPU_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Handle missing GPU runner explicitly
        run: |
          set -euo pipefail
          if [[ "${GPU_AVAILABLE}" != "true" ]]; then
            echo "GPU-required suite BLOCKED: no GPU detected on this runner."
            if [[ "${REQUIRE_GPU_TESTS}" == "1" ]]; then
              echo "REQUIRE_GPU_TESTS=1, so failing workflow."
              exit 1
            fi
            exit 0
          fi

      - name: Run GPU-required suite
        if: env.GPU_AVAILABLE == 'true'
        run: |
          set -euo pipefail
          pytest -q \
            tests/test_force_estimator.py::TestForceEstimator::test_parity_against_sparsh_reference \
            tests/test_force_estimator.py::TestForceEstimator::test_force_estimation_output_format
