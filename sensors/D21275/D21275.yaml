# Device Type
device_type: "DIGIT"
# Device Serial Number
device_serial: "D21275"
# Pixel Per Millimeter
ppmm: 18.509
# Desired Image Width and Height
imgh: 320
imgw: 240
# Raw image width, height, and framerate
raw_imgh: 320
raw_imgw: 240
framerate: 60
# Optical frame transform (DIGIT base → optical center)
optical_frame:
  optical_rpy: [0.0, 0.0175, 0.0]
  optical_xyz: [0.0171, 0.0, 0.0176]
# Force Estimation (Sparsh)
force:
  enable_force: false
  temporal_stride: 5
  encoder: sparsh-dino-base  # Required for decoder compatibility
  decoder: sparsh-digit-forcefield
  bg_offset: 0.5  # Background subtraction offset
  force_vector_scale: [1.0, 1.0, 1.0]  # Per-axis scale to convert normalized force_vector -> Newtons